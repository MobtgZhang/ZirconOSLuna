# ZirconOSLuna Build Configuration
# 控制构建产物与 QEMU 启动方式。编辑后执行 `make` 或 `zig build`。
#
# 可通过环境变量或 make 参数覆盖，例如：
#   make BOOT_METHOD=mbr KERNEL_DESKTOP=cmd
#   zig build run-kernel -Dboot-method=uefi -Dkernel-desktop=cmd
#
# 参考上游布局： https://github.com/MobtgZhang/ZirconOS/blob/main/build.conf
#
# ┌────────────────────┬──────────────────────────────────────────────────────────┐
# │ 变量               │ 含义                                                     │
# ├────────────────────┼──────────────────────────────────────────────────────────┤
# │ DESKTOP            │ 宿主 GUI：`make run-desktop` / `zig build run`（非内核）   │
# │ HOST_DESKTOP       │ 与 DESKTOP 同义（Makefile 别名，便于与 KERNEL_* 区分）    │
# │ KERNEL_DESKTOP     │ QEMU 内 freestanding 内核界面（cmd / luna / none）        │
# │ KERNEL_ARCH        │ 内核 CPU：x86_64 | aarch64 | riscv64 | loongarch64       │
# └────────────────────┴──────────────────────────────────────────────────────────┘

# ── 内核目标架构（与 UEFI 引导映像须同 ISA；多架构见 docs/MULTI_ARCH_CN.md）──
# 默认 loongarch64（与 zig build -Dkernel-arch 一致）。PC QEMU+OVMF X64 请设 KERNEL_ARCH=x86_64。
KERNEL_ARCH = x86_64


# ── 引导方式 ──
# mbr   — SeaBIOS + 混合 ISO（传统 PC 引导；ISO 主要为 UEFI，MBR 行为因固件而异）
# uefi  — OVMF pflash（默认使用 retrage edk2-nightly 预编译固件，见 OVMF_*）
BOOT_METHOD = uefi

# ── 宿主侧「桌面」主题（make run-desktop = 本机 Zig 可执行，非 QEMU 内核）──
# luna | none；none 表示不跑宿主 GUI
# Makefile 中 HOST_DESKTOP 默认等于 DESKTOP，仅命名上与 KERNEL_DESKTOP 对称
DESKTOP = luna

# ── 内核内界面（QEMU 运行 zirconosluna-kernel 时）──
# none — Phase0 后停机（旧行为）
# cmd  — VGA 文本 CMD（PS/2 键盘 + 串口镜像）
# luna — UEFI GOP 帧缓冲 + Luna 色极简桌面（须 BOOT_METHOD=uefi，ZBM 写入 framebuffer tag）
KERNEL_DESKTOP = luna

# ZBM SetMode 首选分辨率（与 RESOLUTION 一致为佳；无匹配模式时选最接近）
ZBM_FB_WIDTH = 1024
ZBM_FB_HEIGHT = 768

# ── 构建优化 ──
OPTIMIZE = Debug
KERNEL_OPTIMIZE = Debug
# 留空 = 由 Zig 按 optimize 决定串口详日志（Debug=true，Release*=false）；可填 true/false 强制
KERNEL_DEBUG_LOG =

# ── 输出 / 工具 ──
OUT = zig-out
ZIG = zig
QEMU = qemu-system-x86_64

# ── 显示 / QEMU ──
RESOLUTION = 1024x768x32
QEMU_MEM = 512M
# 1 = 无 QEMU 窗口，仅串口；0 = 图形窗口 + 串口
QEMU_NOGRAPHIC = 0

# UEFI 固件 — 来自 https://retrage.github.io/edk2-nightly/ （X64 RELEASE 拆分镜像）
# 首次使用 UEFI：在项目根执行  make fetch-ovmf
# 若已用发行版包，可改回例如 /usr/share/OVMF/OVMF_CODE.fd
OVMF_CODE = firmware/ovmf/RELEASEX64_OVMF_CODE.fd
OVMF_VARS = firmware/ovmf/RELEASEX64_OVMF_VARS.fd

# ── 功能开关 ──
ENABLE_IDT = true
