# ZirconOS Boot Manager — 启动项（置于 ISO \BOOT\zbm.ini）
timeout=8
default=0
gfx_menu=1
# 可选：标明「内核/产品」目标架构，避免与下方 x86_64 ZBM 文案混淆（本 ISO 仍为 PC OVMF + BOOTX64）
# profile=LoongArch kernel build (run on PC needs x86_64 kernel or native LoongArch .efi)
# brief_menu=1

entry0_title=ZirconOS Kernel (x86_64)
entry0_kernel=\BOOT\ZKERNEL_X64.ELF

entry1_title=ZirconOS Kernel (compat)
entry1_kernel=\BOOT\ZKERNEL.ELF

# 以下为多架构占位；构建对应 ELF 并放入 ISO 后取消注释或添加条目
# entry2_title=ZirconOS (aarch64 stub)
# entry2_kernel=\BOOT\ZKERNEL_AA64.ELF
